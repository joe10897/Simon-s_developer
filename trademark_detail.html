<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動化商標檢索平台 - Simon Wong</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: white;
            overflow-x: hidden;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center bg-black/80 backdrop-blur-sm border-b border-gray-900">
        <div class="text-xl font-bold tracking-tighter">
            SIMON WONG
        </div>
        <a href="index.html" class="flex items-center gap-2 text-sm uppercase tracking-widest hover:text-blue-400 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
        </a>
    </nav>

    <!-- Content -->
    <div class="pt-32 pb-24 px-4 md:px-24 max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="mb-16 reveal-on-scroll">
            <span class="text-blue-500 font-mono text-sm mb-4 block">Project Detail</span>
            <h1 class="text-4xl md:text-6xl font-black mb-6 tracking-tight">自動化商標檢索平台</h1>
            <p class="text-gray-400 text-lg max-w-3xl leading-relaxed">
                於基律科技開發之多功能自動化系統。整合專利檢索 (Patent)、資料轉換 (Exchange) 與自動翻譯 (Translate) 模組，大幅提升專利服務效率與資料安全性。
            </p>
            
            <div class="flex flex-wrap gap-3 mt-8">
                <span class="px-3 py-1 border border-gray-700 rounded-full text-xs text-gray-300">Python</span>
                <span class="px-3 py-1 border border-gray-700 rounded-full text-xs text-gray-300">Selenium</span>
                <span class="px-3 py-1 border border-gray-700 rounded-full text-xs text-gray-300">Automation</span>
                <span class="px-3 py-1 border border-gray-700 rounded-full text-xs text-gray-300">Data Processing</span>
            </div>
        </div>

        <!-- Gallery -->
        <div class="space-y-24">
            
            <!-- Image 1 -->
            <div class="group reveal-on-scroll" style="animation-delay: 0.2s;">
                <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
                    <img src="img/bbl_demo/Screenshot 2026-01-29 180107.png" alt="System Screenshot 1" class="w-full h-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500">
                </div>
                <p class="mt-4 text-sm text-gray-500 font-mono text-center">系統主介面與功能概覽</p>
            </div>

            <!-- Image 2 -->
            <div class="group reveal-on-scroll" style="animation-delay: 0.3s;">
                <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
                    <img src="img/bbl_demo/Screenshot 2026-01-29 180150.png" alt="System Screenshot 2" class="w-full h-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500">
                </div>
                <p class="mt-4 text-sm text-gray-500 font-mono text-center">檢索設定與參數配置</p>
            </div>

            <!-- Image 3 -->
            <div class="group reveal-on-scroll" style="animation-delay: 0.4s;">
                <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
                    <img src="img/bbl_demo/Screenshot 2026-01-29 180234.png" alt="System Screenshot 3" class="w-full h-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500">
                </div>
                <p class="mt-4 text-sm text-gray-500 font-mono text-center">自動化流程執行狀態</p>
            </div>

            <!-- Image 4 -->
            <div class="group reveal-on-scroll" style="animation-delay: 0.5s;">
                <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
                    <img src="img/bbl_demo/Screenshot 2026-01-29 180236.png" alt="System Screenshot 4" class="w-full h-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500">
                </div>
                <p class="mt-4 text-sm text-gray-500 font-mono text-center">資料輸出與報表生成</p>
            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="py-12 bg-black border-t border-gray-900 text-center text-gray-600 text-[10px] tracking-widest uppercase">
        © 2026 SIMON WONG CHAK YIN. BUILT FOR PRECISION.
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
